<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">
    <h1>Save Our Wildlife</h1>

    <video id="wildlife-video" controls width="100%">
      <source src="wildlife.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <p class="description">
      Somewhere right now, a forest falls silent. 
      A river runs without its fish. 
      A herd grows smaller. Wildlife is not background scenery — it is the heartbeat of our planet, and it is fading. 
      Watch this film, and help us keep that heartbeat alive.
    </p>

    <button id="toggle-btn" aria-label="Play or hide the wildlife video">
      Hide Video
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
